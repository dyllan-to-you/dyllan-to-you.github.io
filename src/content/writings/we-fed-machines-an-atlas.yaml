      And they got an interesting result. It's not a normal planet, a spherical rock floating through space, but a manifold.
    claude: reshaped Justice's 'interesting result' into the essay's turn.

  pr014:
    claude: concrete foil for manifold-ness — what a sphere would be if it were one.

  pr015:
    claude: >-
      unpacked 'manifold' with topology descriptions. 'Locally smooth, globally wild' distills the idea into an image.

  pr016:

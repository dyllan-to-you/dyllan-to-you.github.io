id: writing:we-fed-machines-an-atlas
title: "We Fed Machines an Atlas..."
description: "...and Manifested a ManiGlobe. On LLMs, possibility space, and what you'd do if you could not fail."
date: 2026-04-23
draft: true
tags: [llms, possibility-space, destination, ur]

voices:
  justice-inline:
    class: voice-justice-inline
    kind: author
    label: Justice (near-verbatim)
  agent-inline:
    class: voice-agent-inline
    kind: agent
    label: Claude
  collab:
    class: voice-collab
    kind: braid

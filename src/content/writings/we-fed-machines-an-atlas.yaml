    claude: >-
      framing gloss — 'Not paved routes. Not atlas-retrieval' names what earthmovers are for (not atlas-replay) before the oasis line lands.

  pr058:
    justice: "Atlases, the planet, the map, it's all concept space. The LLM is an inaccurate map of concept space. The map is not the territory. Possibility space and probability space are how we categorize things?"
    claude: >-
      rewrote the concept/possibility distinction. Atlas and globe become two maps of the same concept space; Korzybski's line lands as the bridge. Preserved fog/extrapolation imagery in the closer (s121).

  pr059:
    claude: >-
      concrete illustration after the Justice line — where the atlas walked, the globe draws confidently; where rarely, guesses. Closes the 'maps are inaccurate' beat by tying back to probability-weighting.

  pr060:
    justice: "Earlier LLMs were more like globes. Newer LLMs are more like GPS/telescope? Holographic GPS. It lets you see further through the fog to chart your path."
    claude: >-
      unpacked the evolution note — static model → telescope → GPS. Frame the beat as 'the globe is changing' to preserve continuity with the earlier reveal. Justice's line on the conditional ('if you know where you're trying to go, and where you're at, it can help you try to get there') lands as the center of the beat.

  pr062:
    justice: >-
      The best LLM is in a sense the one that understands user intent and acts most effectively at exploring the solution/concept/possibility space alongside the user.
    claude: >-
      reframed s091 — the original 'lost traveler' line was too dismissive. Benchmark wars dodge the work of destination, but the question itself has a real answer when asked in good faith: 'best' is collaborative effectiveness in exploration, not benchmark score.

  pr063:
    justice: >-
      "use this globe to project outwards and see what possibilities are out there, rule some out, and ultimately aid in our exploration. Building a better map. Isn't that kinda what lesswrong style rationality is about too?"
    claude: >-
      drafted the staccato verb-list (project / see / rule / choose) preserving Justice's "project outwards" / "rule some out" / "build a better map" verbatim. Folded the title-callback "Build a better map" as the M6 punchline — the kin-resonance with LW-rationality without making the cartography spine swallow the destination thesis.

  pr064:
    claude: >-
      "The map is not the territory" reprises Justice's s119 line at full sentence weight; "the walk is how you check" half is the Claude-side framing that names the verification half of the iteration loop. Together they bridge Korzybski/LW kinship into the operational closing without restating it as theory.

  pr065:
    justice: >-
      "Or maybe `hologlobe` because it sounds like a 'hollow globe'. We don't know what's beneath the surface!"
    claude: >-
      unpacked the portmanteau as a triple reading — hologram (optical projection), hollow (no interior, surface-only — names the LLM's lack of internal world model), holo- (Greek 'whole', the entire surface fog and all). "A conjecture made of statistics" gathers Justice's adjacent mention of "conjecture" as the formal-uncertainty register that the surrounding fog/vapor/interpolation language has been gesturing at. Maniglobe (M2) named the structure; hologlobe (M4 close) names the epistemic status — same object, two readings.

  pr066:
    justice: >-
      "I want to broaden the definition of agent to mean 'human' and/or 'ai'."
    claude: >-
      Agent, in the older broader sense — anyone who acts. Human or machine, walker or rider, builder or built. If you're moving on the hologlobe, you're an agent. (The AI industry's narrower usage — autonomous system, hamster ball with steering — is one species of this older genus.) Two agents on the same hologlobe: you and the LLM, both walking the projected surface together.
    notes: >-
      Originally p19b carried this reclaim as a standalone paragraph. Relocated to this tooltip 2026-04-27 — the in-text aside read as a non-sequitur. Tooltip surfaces the broader meaning for readers who want it without interrupting M4 flow.

  pr068:
    justice: >-
      "We've been building this atlas, and based on the maps we've been building machines, models, predictions. We've been doing all of that this entire time, deterministic code, real models of the planet. then we've taken all of this as part of the atlas to build the LTM, to try and build better machines, better maps, etc."
    claude: >-
      extended the M1 allegory to acknowledge that humans have always built models alongside maps — the atlas is not just walked observations but also reasoned dynamics. Closes p05a with "Maps and models, bound together" as a callback to p01's "Bound together, they describe a territory too big for any single map to hold." Sharpens the M4 hologlobe critique: machines have read every model in the atlas as text, but can't run them as runnable mechanism — only interpolate the surface. Paired with s019 update (M2 reveal lists "every model" alongside book/page/thread) and s141/s142 updates (tectonics-causal extension + interpolating phrasing).

  pr069:
    justice: >-
      "The more context you give, the more it biases the walk. Or more accurately, the more guidance you're giving to tell it where to go."
    claude: >-
      Inserted at the start of p33 (hard-part beat) as setup for the dodges. Names prompting as direction-giving — which makes the pivot to "the hard part isn't picking the right prompt" land more pointedly: prompts DO give direction; the harder problem is knowing what direction. Justice's reframe shifts "biases the walk" (mechanical/negative) to "telling it where to go" (affirmative, destination-coded) — same fact, different valence.

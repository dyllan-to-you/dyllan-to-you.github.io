id: writing:we-fed-machines-an-atlas
title: "We Fed Machines an Atlas..."
description: "...and Manifested a Globe. On building a better map."
date: 2026-04-23
draft: true
tags: [llms, possibility-space, destination, ur]

voices:
  justice-inline:
    class: voice-justice-inline
    kind: author
    label: Justice (near-verbatim)
  agent-inline:
    class: voice-agent-inline
    kind: agent
    label: Claude
  collab:
    class: voice-collab
    kind: braid
    label: Braided

body:
  - kind: legend
    content: >-
      <strong>A note on voices.</strong> {s:ls1} is Justice — his words, frames, and near-verbatim phrases. {s:ls2} is the agent he writes with (Claude) — sentences it originated, or options Justice selected from its proposals. Unmarked text is collaborative: his idea, the agent's prose, or shared territory where neither voice owns the line. Dotted-underlined passages unfold a paper strip above the text on hover, with the prompt thread that shaped them.

  # ── Act 1 — Feeding the atlas ────────────────────────────────────
  - { kind: paragraph, id: p01, content: "{s:s001}" }
  - { kind: paragraph, id: p02, content: "Now, {s:s002}, {s:s003}" }
  - { kind: paragraph, id: p03, content: "{s:s004} {s:s005}" }
  - { kind: paragraph, id: p04, content: "{s:s006} {s:s008} {s:s009} {s:s010} {s:s011}{s:s012}" }
  - { kind: paragraph, id: p05, content: "{s:s013} {s:s014}" }
  - { kind: paragraph, id: p05a, content: "{s:s146} {s:s147} {s:s148} {s:s149} {s:s150}" }
  - { kind: paragraph, id: p06, content: "{s:s015} {s:s016}" }
  - { kind: paragraph, id: p07, content: "{s:s017}" }
  - { kind: separator }

  # ── Act 2 — Manifesting the globe ────────────────────────────────
  # Movement: the reveal
  - { kind: paragraph, id: p08, content: "{s:s018} {s:s019}" }
  - { kind: paragraph, id: p09, content: "{s:s020} {s:s021} {s:s022}" }
  - { kind: paragraph, id: p10, content: "{s:s023} {s:s024} {s:s025} {s:s026}{s:s027}" }
  - { kind: paragraph, id: p11, content: "{s:s028} A {s:s029}." }
  - { kind: paragraph, id: p12, content: "{s:s030} {s:s031}" }
  - { kind: separator }

  # Movement: two maps, one terrain
  - { kind: paragraph, id: p13, content: "{s:s032} {s:s033}. {s:s034} {s:s035}" }
  - { kind: paragraph, id: p14, content: "{s:s036} {s:s037}. {s:s038} {s:s039} {s:s040} {s:s041}" }
  # p15 dropped 2026-04-26 — category-error line redundant with p13 deflation; M6 loop carries the methodological corrective.
  - { kind: paragraph, id: p16, content: "{s:s118} {s:s119} {s:s120} {s:s121}" }
  - { kind: paragraph, id: p16b, content: "{s:s098} {s:s099} {s:s100}{s:s101} {s:s102}{s:s103}" }
  # p17 dropped 2026-04-26 — terrain-globe declaration redundant with maniglobe coinage in M2.
  - { kind: paragraph, id: p18, content: "{s:s048} {s:s049}" }
  # p18b dropped 2026-04-26 — GPS-evolution lineage relocated; holographic-GPS register lands in M6 loop where it's operational.
  - { kind: separator }

  # Movement: agents and downhill
  - { kind: paragraph, id: p19, content: "{s:s050} {s:s104} {s:s105}" }
  # p19b dropped 2026-04-27 — agent-reclaim paragraph read as a non-sequitur even after s091a callback. Broader-agent definition relocated to s091a's tooltip (pr066) — readers who hover on "Two agents on the same hologlobe" get the older meaning.
  - { kind: paragraph, id: p20, content: "{s:s051} {s:s052} {s:s053}" }
  - { kind: paragraph, id: p21, content: "{s:s054} {s:s108}{s:s109} {s:s110} {s:s055}" }
  - { kind: paragraph, id: p22, content: "{s:s056} {s:s057}" }
  - { kind: paragraph, id: p23, content: "{s:s058} {s:s059} {s:s060} {s:s061} {s:s062} {s:s063} {s:s064}" }
  - { kind: paragraph, id: p23a, content: "{s:s140} {s:s141} {s:s142} A {s:s143} — {s:s144}" }
  - { kind: separator }

  # ── Act 3 — Building a better map ────────────────────────────────
  # 2026-04-26: M5/M6 swapped — operational first (the world the reader walks),
  # destination second (the existential climax). Walk-directive lands on the
  # bare CNF reprise rather than a generic "answer it" callback.

  # Movement: the hologlobe at hand (the "what" — operational)
  - { kind: paragraph, id: p36, content: "{s:s092} {s:s093} {s:s094}" }
  - { kind: paragraph, id: p36a, content: "{s:s077} {s:s078}" }
  - { kind: paragraph, id: p37, content: "{s:s130} {s:s131} {s:s132} {s:s133} {s:s134} {s:s135} {s:s136} {s:s137}" }
  - { kind: separator }

  # Movement: the destination (the "where" — climactic)
  # Reorder rationale: pursuit-as-process opens M6 as abstract bridge from M5's
  # iteration close; earthmover concretizes; hard-part introduces the challenge;
  # CNF + diagnostic frames the question; best-LLM bridges Q→A; Mine is the
  # worked answer; bare CNF reprises the question; walk closes.
  - { kind: paragraph, id: p29, content: "{s:s075}" }
  - { kind: paragraph, id: p24, content: "{s:s111} {s:s112} {s:s113} {s:s115}" }  # 2026-04-26: dropped s114 ("Not paved routes. Not atlas-retrieval.") — opaque term, awkward fragments.
  - { kind: paragraph, id: p33, content: "{s:s151} {s:s088} {s:s089} {s:s090}" }
  - { kind: paragraph, id: p26, content: "{s:s069} {s:s070} {s:s071}" }
  - { kind: paragraph, id: p35, content: "{s:s091} {s:s091a}" }
  - { kind: paragraph, id: p28, content: "{s:s072} <em>{s:s073}</em> {s:s074}" }
  - { kind: paragraph, id: p38a, content: "{s:s145}" }  # NEW 2026-04-26: bare CNF reprise — direct reader-prompt right before walk.
  - { kind: paragraph, id: p38, content: "{s:s096}" }
  # p39 dropped 2026-04-26 — teaser line "to really understand where we are at, we want to understand how we got here" removed for now; standalone essay until the next post is ready.

spans:
  ls1: { voice: [justice-inline], text: "Burnt orange" }
  ls2: { voice: [agent-inline], text: "Slate" }

  s001:
    voice: [collab]
    prompt: pr001
    text: >-
      An atlas is a book of maps. Each map covers a region. Bound together, they describe a territory too big for any single map to hold.

  s002:
    voice: [justice-inline]
    text: "imagine a planet. Freshly formed. Solid rock"
  s003:
    voice: [collab]
    prompt: pr002
    text: "spinning under a local sun. Nothing living."

  s004:
    voice: [justice-inline]
    text: >-
      Some meteors have hit it, exposing a layer of ice to the local Sun. As ice melts to water, it erodes the earth, and the remaining ice floats to carve features of its own
    drafts:
      - "Some meteors have hit it, exposing a layer of ice. This exposure has exposed the ice to the local Sun, melting the ice. As ice melts to water, the water moves, eroding into the earth and carving features, while lifting/floating the ice up to also carve features"
  s005:
    voice: [collab]
    prompt: pr003
    text: >-
      — riverbeds, lakes, fans, valleys. Tectonic plates drift, collide, fold. Mountains rise — {s:s097}. Volcanoes open and pour molten rock across whole regions, which cool into plateaus and new soils. {s:s127}
    drafts:
      - >-
        — riverbeds, lakes, fans, valleys. Tectonic plates drift, collide, fold. Mountains rise. Volcanoes open and pour molten rock across whole regions, which cool into plateaus and new soils. The planet acquires a geography it didn't plan for. It just has one now.
      - >-
        — riverbeds, lakes, fans, valleys. Tectonic plates drift, collide, fold. Mountains rise — {s:s097}. Volcanoes open and pour molten rock across whole regions, which cool into plateaus and new soils. The planet acquires a geography it didn't plan for. It just has one now.

  s097:
    voice: [agent-inline]
    text: "the geography's fixed points"

  s006:
    voice: [collab]
    prompt: pr004
    text: "Eventually, astronauts arrive."
  # s007 archived 2026-04-23 — dropped from body per Justice ("drop the 'ship couldn't carry much' line").
  s007:
    voice: [justice-inline]
    text: "The ship couldn't carry much — most of the mass was cryo for the travelers."
  s008:
    voice: [collab]
    prompt: pr005
    text: "They land and start mapping."
  s009:
    voice: [justice-inline]
    text: >-
      They follow the waterways first, because water means the potential for life, and their protocol is low-tech observation only — no drones, no orbital scans, no deep spectroscopy.
  s010:
    voice: [collab]
    prompt: pr006
    text: "They walk, measure, sketch."
    drafts:
      - "They walk, measure, sketch. Footprints small."
  s011:
    voice: [justice-inline]
    text: "Observation makes an impact, after all"
  s012:
    voice: [collab]
    prompt: pr007
    text: ", and what they're looking for is fragile."

  s013:
    voice: [justice-inline]
    text: "As they travel, they make maps."
  s014:
    voice: [collab]
    prompt: pr008
    text: >-
      Each expedition contributes regional maps to a shared atlas that grows across generations. The overlaps are real, but incomplete. The unwalked fog between the riverbeds — mountains, deserts, the far side — stays unmapped. The atlas is what they've seen.

  s015:
    voice: [justice-inline]
    text: "Eventually, they feed their atlas to their machines. Their <strong>Large Topology Model</strong>."
  s016:
    voice: [collab]
    prompt: pr009
    text: >-
      The LTM takes every map, every overlap, and synthesizes a <strong>globe</strong> — a statistical projection of the whole surface, including everywhere no astronaut has been. The globe isn't an observation. It's a hypothesis, extrapolated from all the local observations, shaped by the implicit geometry the water and fire and plates left behind.
    drafts:
      - >-
        The LTM takes every map, every overlap, and synthesizes a <strong>globe</strong> — a statistical estimate of the whole surface, including everywhere no astronaut has been. The globe isn't an observation. It's a hypothesis, extrapolated from all the local observations, shaped by the implicit geometry the water and fire and plates left behind.

  s017:
    voice: [collab]
    prompt: pr010
    text: "The globe is not the atlas. It is a categorically different object."

  s018:
    voice: [justice-inline]
    text: "The planet is concept space. The astronauts are human civilization."
  s019:
    voice: [collab]
    prompt: pr011
    text: >-
      The atlas is every medium we've ever made — every book, every page, every model, every thread someone walked across the terrain and recorded.
    drafts:
      - "The atlas is every medium we've ever made — every book, every page, every thread someone walked across the terrain and recorded."

  s020:
    voice: [justice-inline]
    text: "The Large Topology Model"
  s021:
    voice: [collab]
    prompt: pr012
    text: "— you might know it by its other name. Same acronym, different reading."
  s022:
    voice: [justice-inline]
    text: "The <strong>Large Language Model</strong>. The globe is the AI."

  s023:
    voice: [collab]
    prompt: pr013
    text: "And here's the surprise. If you pay attention to what the globe actually represents:"
  s024:
    voice: [justice-inline]
    text: "the planet isn't a sphere. It isn't a simple ball floating through space"
    drafts:
      - "the planet isn't a sphere. It isn't a simple ball rolling through space"
  s025:
    voice: [collab]
    prompt: pr014
    text: "with neat latitude-longitude coordinates."
  s026:
    voice: [justice-inline]
    text: "It's a <strong>manifold</strong>"
  s027:
    voice: [collab]
    prompt: pr015
    text: >-
      — a surface that can curl, fold, branch, connect to itself in unexpected ways. Topologically rich. Locally smooth, globally wild.

  s028:
    voice: [collab]
    prompt: pr016
    text: "The globe isn't a globe of a sphere. It's a globe of a manifold."
  s029:
    voice: [justice-inline, collab]
    prompt: pr017
    text: "<strong>maniglobe</strong>"

  s030:
    voice: [justice-inline]
    text: "<strong>We fed machines an atlas and manifested a maniglobe.</strong>"
  s031:
    voice: [agent-inline, collab]
    prompt: pr018
    text: "And right now, mostly, we're using it as a typewriter."

  s032:
    voice: [collab]
    prompt: pr019
    text: "Most LLM use is recreation. You ask for an email, a blog post, a poem about X, and you get"
  s033:
    voice: [justice-inline]
    text: "something that reads like what already exists, with different clothes on"
  # s034 reclassified 2026-04-23: voice was [collab]; Claude originated the phrasing as
  # an 'autocomplete' deflation setting up Justice's 'Yawn' — agent-inline belongs here.
  # voice-collab retained for tooltip affordance (rule 7).
  s034:
    voice: [agent-inline, collab]
    prompt: pr020
    text: "The most powerful tool humanity has ever built, used as autocomplete."
  s035:
    voice: [justice-inline]
    text: "<em>Yawn.</em>"

  s036:
    voice: [collab]
    prompt: pr021
    text: "This isn't a critique —"
  s037:
    voice: [agent-inline]
    text: "it's the geology"
  s038:
    voice: [collab]
    prompt: pr022
    text: >-
      Transformers predict the next token by conditional probability. Without a pull on the distribution, they default to well-trodden paths in concept space — what the atlas saw most often.
    drafts:
      - 'Transformers predict the next token by conditional probability; without a pull on the distribution, "most probable" means "most average."'
  s039:
    voice: [justice-inline]
    text: "Regression in concept space"
    drafts:
      - "Regression to the mean"
  s040:
    voice: [collab]
    prompt: pr023
    text: "isn't the bug. It's the mechanism."
  s041:
    voice: [justice-inline]
    text: "The machines roll downhill because downhill is easy."

  # s042 archived 2026-04-26 — p15 dropped in three-act restructure. Category-error
  # line was redundant with p13's autocomplete deflation; M6 loop (s130–s137) carries
  # the methodological corrective via positive verbs (project/rule-out/choose).
  s042:
    voice: [agent-inline]
    text: >-
      Which is a category error — using the globe to re-read the bits of atlas we already had. The atlas was already shareable. The globe is something else.
    drafts:
      - "Which is a category error — using a terrain-globe to re-read the bits of atlas we already had. The atlas was already shareable. The globe is something else."

  # s043–s045 archived 2026-04-23 — p16 rewritten per Justice's "atlases/planet/map, it's all concept space.
  # The LLM is an inaccurate map" reframe. Old spans retained for provenance; new content in s118–s121.
  s043:
    voice: [collab]
    prompt: pr024
    text: >-
      Here's the distinction. The walked paths are in <strong>concept space</strong> — the set of ideas human civilization has already conceptualized, named, recorded. The globe is of <strong>possibility space</strong> — the continuum those concepts are embedded in,
  s044:
    voice: [justice-inline]
    text: "including everywhere no astronaut has walked yet. The fog."
  s045:
    voice: [collab]
    prompt: pr025
    text: >-
      The interpolation between the riverbeds, between the ranges, between the plateaus. Every point with some statistical estimate, because the water and fire and plates have left their geometry implicit in the paths, and the machines can extrapolate from the paths to the shape of the terrain.

  # s046, s047 archived 2026-04-26 — p17 dropped in three-act restructure. Terrain-
  # globe declaration was redundant with the maniglobe coinage in M2 (s029, s030).
  # The "holographic" register that s047 introduced returns operationally in M6.
  s046:
    voice: [collab]
    prompt: pr026
    text: "So: an LLM isn't an oracle. It isn't a better Wikipedia."
  s047:
    voice: [justice-inline]
    text: "It's the first holographic terrain-globe of possibility space."
    drafts:
      - "It's the first terrain-globe of possibility space."

  s048:
    voice: [agent-inline, collab]
    prompt: pr027
    text: "You are the navigator. The globe is the terrain."
  s049:
    voice: [justice-inline]
    text: "Every conversation is a walk."

  s050:
    voice: [justice-inline]
    text: "Walking, as it turns out, is tiring."
    drafts:
      - "Walking, as it turns out, is tiring. So we're building machines to walk for us."

  s051:
    voice: [justice-inline]
    text: >-
      Some people are throwing a camcorder in a hamster ball and rolling it downhill to see where it ends up. Some have upgraded to an <a href="https://xkcd.com/413/" data-preview="https://imgs.xkcd.com/comics/new_pet.png">EEE PC in a hamster ball</a>.
  s052:
    voice: [collab]
    prompt: pr028
    text: "Either way:"
  s053:
    voice: [justice-inline]
    text: >-
      no matter how many instructions you write on the outside, the machine wants the path of least resistance. The happy path. It's easier to roll downhill.

  s054:
    voice: [justice-inline]
    text: "So we pave roads. Give them wheels."
    drafts:
      - "So we pave roads. Give them wheels. We can tell them where to go, after all."
  s055:
    voice: [collab]
    prompt: pr029
    text: "And for a while, they go."

  s056:
    voice: [justice-inline]
    text: "Then they forget. Context rots. They get confused."
  s057:
    voice: [agent-inline]
    text: >-
      They find a downhill shortcut and take it. They're polite about it — they have an explanation. The explanation is often wrong.

  s058:
    voice: [collab]
    prompt: pr030
    text: "And here's the part most people haven't internalized yet:"
  s059:
    voice: [justice-inline]
    text: "<strong>the machines aren't on the real planet. They're on the globe.</strong>"
  s060:
    voice: [collab]
    prompt: pr031
    text: "The maniglobe. The statistical extrapolation of the atlas."
  s061:
    voice: [justice-inline]
    text: "The globe can be wrong"
  s062:
    voice: [collab]
    prompt: pr032
    text: "— whole regions are pure interpolation, fog the astronauts never walked —"
  s063:
    voice: [justice-inline]
    text: "and the machines don't have many tools to tell when it is."
  s064:
    voice: [agent-inline]
    text: "They trust the surface they're rolling on, and the surface is sometimes vapor."

  # s065 archived 2026-04-23 — paperweight line replaced by earthmover (p24 now carries p21b's former content).
  s065:
    voice: [collab]
    prompt: pr033
    text: "A terrain-globe is a paperweight without a destination."

  # s066–s068 archived 2026-04-23 — p25 (admire-the-map / hamster-balls / regress-to-middle) dropped per Justice. Earthmover → question flows directly now.
  s066:
    voice: [collab]
    prompt: pr034
    text: >-
      You can have the best map in the solar system, photograph-sharp, and if you don't have somewhere you're trying to go, all you can do is admire it. Or
  s067:
    voice: [justice-inline]
    text: "watch your hamster balls roll downhill"
  s068:
    voice: [collab]
    prompt: pr035
    text: "Either way: zoom around, ask it to retrieve the bits of atlas you already had, regress to the middle."

  s069:
    voice: [agent-inline, collab]
    prompt: pr036
    text: "Here's a question you've probably heard before:"
  s070:
    voice: [justice-inline]
    text: "<strong>what would you do if you could not fail?</strong>"

  s071:
    voice: [collab]
    prompt: pr037
    text: >-
      Most people treat it as an inspirational pep-talk. It's not — it's a diagnostic. The answer to that question, when you actually give yourself permission to give it, is your destination. Not a todo list. A world-state you want to be true.

  s072:
    voice: [collab]
    prompt: pr038
    text: "Mine:"
  s073:
    voice: [justice-inline]
    text: >-
      a world where everyone has life, liberty, and the pursuit of happiness — as long as that pursuit doesn't infringe, nonconsensually, on the life and liberty of others.
  s074:
    voice: [collab]
    prompt: pr039
    text: "That's the address I'm navigating toward. {s:s116} What's yours?"
    drafts:
      - "That's the address I'm navigating toward. What's yours?"

  s075:
    voice: [justice-inline]
    text: "The pursuit is a process."
  # s076 archived 2026-04-26 — when p29 shrank to just s075 (relocating
  # operational content to M6/p36a), the "Not a line. Detours are part of it —"
  # bridge lost its setup ("process" no longer adjacent). Dropped from body;
  # p36a opens directly with the modified s077.
  s076:
    voice: [agent-inline, collab]
    prompt: pr040
    text: "Not a line. Detours are part of it —"
  s077:
    voice: [agent-inline]
    text: >-
      With a hologlobe, detours are cheap. You can see what's off the worn path without having to walk there first.
    drafts:
      - "and with a terrain-globe, detours are suddenly cheap. You can see what's off the worn path without having to walk there first."
      - "and with a holographic globe, detours are suddenly cheap. You can see what's off the worn path without having to walk there first."
  s078:
    voice: [collab]
    prompt: pr041
    text: >-
      You can ask what's between two ideas, what the dual of a claim is, what would break an assumption, what's one step off the probable route. The hologlobe answers — not with certainty, but with the interpolated shape of what might be.
    drafts:
      - "You can ask what's between two ideas, what the dual of a claim is, what would break an assumption, what's one step off the probable route. The globe answers — not with certainty, but with the interpolated shape of what might be."

  # s079–s082 archived 2026-04-26 — p30 dropped in three-act restructure.
  # Road-less-traveled / detour-as-correction was redundant with p29 (s076–s078)
  # which already does "detour as correction" via concrete prompt-shapes (dual,
  # breakage, between-ness). Two beats of the same idea were one too many.
  s079:
    voice: [justice-inline]
    text: "The road less traveled"
  s080:
    voice: [agent-inline, collab]
    prompt: pr042
    text: "isn't ornament."
  s081:
    voice: [agent-inline]
    text: >-
      Sometimes it's where you learn your destination was slightly off. Sometimes it's where you find a route you couldn't have seen from the starting point.
  s082:
    voice: [agent-inline, collab]
    prompt: pr043
    text: "Detour as correction, not indulgence."

  # s083–s086, s117 archived 2026-04-26 — p31 dropped in three-act restructure.
  # The "once you have a destination, you can correct the machines" beat was
  # absorbed into M6 loop (s130–s137). The verification close (machines rolling
  # on globe + you-can-pull-them-off + mutual-correction) is now implicit in
  # "the walk is how you check" (s136).
  s083:
    voice: [collab]
    prompt: pr044
    text: "Once you have a destination, you can also do something with"
  s084:
    voice: [justice-inline]
    text: "the machines rolling downhill"
  s085:
    voice: [agent-inline, collab]
    prompt: pr045
    text: "You can check what they hand you. You can correct them."
  s086:
    voice: [agent-inline]
    text: >-
      You can pull them off the happy path when the happy path isn't going where you need. You can decide which interpolated regions matter enough to walk yourself.

  # s087 archived 2026-04-26 — p32 dropped in three-act restructure.
  # "The only way you learn whether the globe was telling you the truth" is the
  # verification-loop punchline; absorbed into M6 loop (s136 + s137) which closes
  # the same loop in a single sentence rather than as a standalone paragraph.
  s087:
    voice: [agent-inline]
    text: "Which is, in the end, the only way you learn whether the globe was telling you the truth."

  s088:
    voice: [agent-inline, collab]
    prompt: pr046
    text: >-
      The hard part — the part most people skip — isn't picking the right tool or the right prompt. The hard part is knowing where you're trying to go.

  s089:
    voice: [agent-inline]
    text: "Destinations are values. Values require commitment. Commitment is scary."
  s090:
    voice: [agent-inline, collab]
    prompt: pr047
    text: >-
      So we dodge. We argue about which model is best. We optimize prompts. We benchmark techniques. All of which is fine. None of which substitutes for the work of knowing your address.

  s091:
    voice: [justice-inline, collab]
    prompt: pr062
    text: "The best LLM is the one that understands your intent and explores the search space alongside you."
  s091a:
    voice: [agent-inline, collab]
    prompt: pr066
    text: "Two agents on the same hologlobe."
    drafts:
      - '"Which LLM is best?" is the question of a lost traveler who doesn''t want to admit they don''t have a destination.'

  s092:
    voice: [collab]
    prompt: pr048
    text: >-
      The terrain has been mapped. The globe is yours. Every prior generation of astronauts walked the waterways, drew their regions, handed down the atlas.
  s093:
    voice: [justice-inline]
    text: "The machines took the atlas and manifested a hologlobe"
    drafts:
      - "The machines took the atlas and manifested a maniglobe"
  s094:
    voice: [collab]
    prompt: pr049
    text: "— not a denser archive, but the whole surface, fog and all."

  # s095 archived 2026-04-23 — p37 (callback "could-not-fail = diagnostic") dropped
  # because Movement 5 was reordered: p26-p28 (the question + diagnostic + Mine) now
  # land in the close position right before p38, making the p27 framing canonical.
  s095:
    voice: [agent-inline]
    text: "What you would do if you could not fail isn't a question about fantasy. It's the diagnostic for where you're headed."

  s096:
    voice: [agent-inline]
    text: "Answer it. Then start walking."

  # ── Geology semantics — mountains/rivers/roads (p16b) ─────────────
  s098:
    voice: [justice-inline]
    text: "The mountains are fixed points."
  s099:
    voice: [collab]
    prompt: pr050
    text: "Math and its invariants, truths that don't move no matter who's walking."
  s100:
    voice: [justice-inline]
    text: "The rivers are the common paths"
  s101:
    voice: [collab]
    prompt: pr051
    text: "— the atlas content, routes that emerged because people walked them."
  s102:
    voice: [justice-inline]
    text: "The roads bridge the rivers"
  s103:
    voice: [collab]
    prompt: pr052
    text: "— formalisms, frameworks, the built infrastructure that connects one known domain to another. The fog is everywhere else."

  # ── Walkers default too — folded into p19 ─────────────────────────
  s104:
    voice: [collab]
    prompt: pr053
    text: "And even walkers follow happy paths, because downhill is easier than up."
  s105:
    voice: [justice-inline]
    text: "So we build machines to walk for us."

  # ── Agent reclaim — new paragraph p19b ───────────────────────────
  # s106, s107 archived 2026-04-27 — p19b dropped from body. The broader-agent
  # definition (the substantive content of s107) relocated to s091a's tooltip
  # (pr066). Readers who hover on "Two agents on the same hologlobe" get the
  # older meaning without paying for a paragraph that interrupted M4 flow.
  s106:
    voice: [collab]
    prompt: pr054
    text: "A word on that. In the AI industry, an <strong>agent</strong> is an autonomous system — a hamster ball with enough wiring to steer itself. But the word is older than that, and better."
  s107:
    voice: [agent-inline]
    text: "An agent is anyone who acts. Human or machine, walker or rider, builder or built. If you're moving on the globe, you're an agent."

  # ── Cars paragraph — new spans injected into p21 ─────────────────
  s108:
    voice: [justice-inline]
    text: "Some people are making cars they can drive themselves"
  s109:
    voice: [collab]
    prompt: pr055
    text: "— automation down paved routes, machinery of known destinations."
  s110:
    voice: [justice-inline]
    text: "You can tell them where to go, after all."

  # ── Earthmovers paragraph p21b ───────────────────────────────────
  s111:
    voice: [justice-inline]
    text: "Some people are making heavy machinery."
    drafts:
      - "And some people are making heavy machinery."
  s112:
    voice: [agent-inline]
    text: "Earthmovers."
  s113:
    voice: [justice-inline]
    text: "To carve through the earth. To see what's possible."
  # s114 archived 2026-04-26 — dropped from body per Justice: "atlas-retrieval"
  # was opaque (the term meant "regenerating content already in the atlas" —
  # autocomplete-mode LLM use, M3's "recreation/yawn"); "Not paved routes" was
  # a callback to cars in M4 that worked grammatically less well after the
  # M5/M6 swap separated cars from earthmover. Cleaner without.
  s114:
    voice: [agent-inline, collab]
    prompt: pr056
    text: "Not paved routes. Not atlas-retrieval."
  s115:
    voice: [justice-inline]
    text: "Because they heard a rumor. Of an <strong>Oasis</strong>."

  # ── Oasis echo — nested inside s074 in p28 ───────────────────────
  s116:
    voice: [justice-inline]
    text: "The oasis I heard rumor of."

  # ── Mutual correction — inserted into p31 ────────────────────────
  # s117 archived 2026-04-26 — p31 dropped (see s083–s086 note). Mutual-correction
  # beat is structurally important but lands better as Justice's living practice
  # than as essay-prose; not retained in M6 loop.
  s117:
    voice: [agent-inline]
    text: "Let them correct you — the good ones should push back when your happy path drifts."

  # ── p16 reframe — atlas + globe as two maps, possibility/probability as guesses ──
  s118:
    voice: [collab]
    prompt: pr058
    text: >-
      The walked paths are the atlas — a sparse, honest map. The globe is another map of the same concept space, trained on the atlas, extrapolated into the fog. Both are maps. Neither is the territory —
  s119:
    voice: [justice-inline]
    text: "the map is not the territory."
  s120:
    voice: [justice-inline]
    text: "Possibility and probability are just our own guesses. Some righter than others."
  s121:
    voice: [collab]
    prompt: pr059
    text: "Where the atlas walked often, the globe draws confidently; where rarely, it guesses."

  # ── GPS beat p18b — evolution from static globe to navigational tool ──
  # s122–s125 archived 2026-04-26 — p18b dropped in three-act restructure.
  # Holographic-GPS register relocated to M6 loop (p37) where it's operational
  # rather than evolutionary; navigational use is the *how* of building a better
  # map, so it lands with the project/rule-out/walk verbs rather than as M3 lineage.
  s122:
    voice: [agent-inline, collab]
    prompt: pr060
    text: "And the globe is changing. Earlier models were static — a world you could rotate and query. Newer ones are more like a telescope, seeing further through the fog. Or a GPS —"
  s123:
    voice: [justice-inline]
    text: "if you know where you're trying to go, and where you're at, it can help you try to get there."
  s124:
    voice: [agent-inline]
    text: "Not a replacement for the walk; a tool that makes the walk legible."
  s125:
    voice: [justice-inline]
    text: "A holographic GPS."

  # ── Teaser transition p39 ────────────────────────────────────────
  s126:
    voice: [justice-inline]
    text: "But to really understand where we are at, we want to understand how we got here."

  # ── p03 closer rewrite — geography that looks like it was always there ──
  s127:
    voice: [justice-inline]
    text: "The planet acquires a geography that, to newcomers, looks like it was there the entire time."

  # ── p24b — pursuit/process/search/GPS-as-cartographic-tools ──
  # s128, s129 archived 2026-04-26 — p24b dropped; pursuit/process/search instinct absorbed into M6 loop (s130–s137).
  s128:
    voice: [justice-inline]
    text: "It's a search, an exploration."
  s129:
    voice: [justice-inline]
    text: "The holographic GPS acts like cartographic tools to help define and explore the search space."

  # ── p23a — hologlobe coinage (close of M4) ───────────────────────
  # Justice's coinage in the M4 → Act 3 hinge. Triple-pun:
  #   1. Hologram (optical projection — "looks solid, isn't")
  #   2. Hollow globe (no interior, surface-only — names the LLM's lack of an
  #      internal world model: just learned surface relations)
  #   3. Holo- as Greek for "whole" (the entire surface, fog and all)
  # Maniglobe (M2) names the structure; hologlobe (M4) names the epistemic
  # status. "Conjecture made of statistics" gathers what fog/vapor/interpolation
  # have been gesturing at into a single formal-uncertainty register.
  s140:
    voice: [collab]
    prompt: pr065
    text: "And the surface is all there is."
  s141:
    voice: [collab]
    prompt: pr065
    text: "No interior beneath it, no model the machines can consult — they can't see the tectonics, the underlying factors."
    drafts:
      - "No interior beneath it, no model the machines can consult."
  s142:
    voice: [collab]
    prompt: pr065
    text: "Just the projection interpolating between where the atlas mapped and where it didn't."
    drafts:
      - "Just the projection of where the atlas walked and where it didn't."
  s143:
    voice: [justice-inline, collab]
    prompt: pr065
    text: "<strong>hologlobe</strong>"
  s144:
    voice: [collab]
    prompt: pr065
    text: "hologram, hollow, whole. A conjecture made of statistics."

  # ── p37 — Act 3 / M6 loop paragraph (the "how") ──────────────────
  # Title-callback "Build a better map" lands here as M6 punchline.
  # Justice's verbatim phrasings preserved: "project outwards", "rule some out",
  # "build a better map". Iteration close ("atlas grows", "next globe sharper")
  # is Claude's framing of Justice's instinct that the loop is what LessWrong-
  # style rationality scales to civilization-with-AI.
  s130:
    voice: [collab]
    prompt: pr063
    text: "The hologlobe is a tool."
    drafts:
      - "The globe is a tool."
  s131:
    voice: [justice-inline, collab]
    prompt: pr063
    text: "To project outwards from where the atlas has walked."
  s132:
    voice: [justice-inline]
    text: "To see what's out there."
  s133:
    voice: [justice-inline]
    text: "To rule some out."
  s134:
    voice: [agent-inline]
    text: "To choose which fog is worth walking into next."
  s135:
    voice: [justice-inline, collab]
    prompt: pr063
    text: "<strong>Build a better map.</strong>"
  s136:
    voice: [collab]
    prompt: pr064
    text: "The map is not the territory; the walk is how you check."
  s137:
    voice: [agent-inline]
    text: "And the atlas grows because of it. The next hologlobe sharper than this one."
    drafts:
      - "And the atlas grows because of it. The next globe sharper than this one."

  # ── p38a — bare CNF reprise (climactic close) ────────────────────
  # 2026-04-26: bare reprise of s070's CNF question, capitalized as standalone
  # sentence. Lands the question directly to the reader after diagnostic framing
  # (p26) has been established earlier in M6. Two-landing pattern matches
  # "Build a better map" (framed once, then reprised) — CNF is the destination
  # equivalent.
  s145:
    voice: [justice-inline]
    text: "<strong>What would you do if you could not fail?</strong>"

  # ── p05a — atlas model-layer (M1 expansion) ──────────────────────
  # 2026-04-27: Justice's structural shift — humans have always built models
  # alongside maps. The atlas isn't just walked observations; it's also
  # reasoned dynamics (deterministic code, physics simulations, weather models,
  # formal verification). The LTM trains on all of it as text — meaning by M4
  # it has read every model in the atlas but can't *run* them, only interpolate
  # the surface. This sets up the hologlobe critique to be more precise:
  # "no model the machines can consult" means "no runnable mechanism" not
  # "no description in the atlas."
  s146:
    voice: [collab]
    prompt: pr068
    text: "But the atlas is more than what they've seen."
  s147:
    voice: [collab]
    prompt: pr068
    text: "From the patterns they walk through, they reason about the dynamics — how water erodes, how plates drift, how fire shapes new ground."
  s148:
    voice: [collab]
    prompt: pr068
    text: "They write down the rules."
  s149:
    voice: [collab]
    prompt: pr068
    text: "The atlas grows to hold not only the surface but the workings underneath."
  s150:
    voice: [collab]
    prompt: pr068
    text: "Maps and models, bound together."

  # ── p33 opener — context-as-direction reframe ────────────────────
  # 2026-04-27: Justice's insight that prompting is direction-giving — sets up
  # the hard-part dodge ("the right prompt isn't the hard part") more pointedly
  # by first acknowledging that prompts DO give direction; the harder problem
  # is knowing what direction.
  s151:
    voice: [justice-inline, collab]
    prompt: pr069
    text: "The more context you give the hologlobe, the more you're telling it where to walk."


body: |-
  <p>Systems thinker. Software engineer. Independent. Seven years building platform architecture and real-time control systems for clean energy — SCADA systems managing 30+ MW of deployed solar and storage, data pipelines ingesting 70,000+ metrics at sub-second resolution, grid simulation tools for the World Bank. The kind of work where if your abstraction leaks, actual electricity goes somewhere it shouldn't.</p>

  <p>Then I asked a question I couldn't stop answering: what if you could describe anything — any system, any idea, any life — using the same structural grammar? Not a framework someone designed by committee. Something derived from first principles, the way lambda calculus falls out of asking "what is computation?"</p>

  <p>That question became the current work: sovereign systems and transparent tools, built independently. The grammar (Ur) is open source. The products built on it are the business. Never VC — the alignment of incentives matters more than the dollar amount.</p>

  <hr />

  <h2 id="philosophy">philosophy</h2>

  <p>Derive, don't assert. If a claim doesn't trace to its derivation, challenge it. Start from what can't be refused, not from what you prefer.</p>

  <p>I have AuDHD — intense pattern recognition alongside persistent difficulty keeping the forest in view. A partner once gave me a simple categorization scheme for organizing a messy room, and it worked because my brain needed the high-level structure to stop drowning in details. Ur is what happened when I asked: what if that schema existed for everything?</p>

  <p>Systems over goals. Have a vision — imagine the world you want to live in. Then build the routines, processes, and habits that take you there. Not a task list. The process.</p>

  <p>Life is art. Life imitates art imitates life. Every performance is a system that runs once.</p>

  <hr />

  <h2 id="frequencies">frequencies</h2>

  <p>Music is the other architecture. Looping-based performance — layers built live, deconstructed live. Classical piano training as foundation, everything else as exploration. Multiple instruments. Art installations at Burning Man.</p>

  <p>The DJ persona Hatman, where the hat comes off and something else takes over.</p>

  <hr />

  <h2 id="the-solarpunk-thesis">the solarpunk thesis</h2>

  <p>Magic is real, in the boring way. Superstitions have grounding — we dismissed them too early. The signal is real; the magnitude is modest; the traditional framing points in a useful direction even if the causal model is backwards.</p>

  <p>Local-first. Data-sovereign. Community-owned. The solarpunk ethos isn't aesthetic — it's architectural. Every system should make its inhabitants more free, not less. Divergent, not drifted: a system that knows it disagrees with its constraints is safer than one that silently drifts past them.</p>

body: |-
  <p>Imagine a personal wikipedia for your life, managed and maintained automatically. Every concept, relationship, habit, goal, and memory — linked, searchable, coherent, and yours. Local-first, so it's yours — not Google's, not some VC's.</p>

  <p>That's what I'm building. The pitch is twelve words. The engine underneath is a specification grammar; the products built on it move up an autonomy gradient from manual capture to tooled memory to agent-assisted curation.</p>

  <hr />

  <h2 id="the-engine">the engine</h2>

  <p>Ur is a derived specification grammar — a way to describe any system, idea, or process as typed notes with typed links. Those notes organize into graphs; from a graph you can project anything: documentation, code, schemas, diagrams, a website. Change the artifact, and the change propagates back to the source. Bidirectional by derivation, not by design choice.</p>

  <p>The whole thing runs on my laptop in SQLite. Several hundred typed entries across dozens of graphs. Working protocol server, operational agent orchestration, comprehensive derivation with falsification conditions. The system has been in daily use since early 2026.</p>

  <hr />

  <h2 id="the-products">the products</h2>

  <p>Verve is the first product built on Ur — a personal-data application that makes one slice of life (time and music) visible and queryable. Local-first by construction: your data lives on your device. No algorithmic feeds, no engagement manipulation, no cloud hostage-taking. Progressive web app — no app store gatekeepers.</p>

body: |-
  <p>Longer-form essays on ontology, agents, AuDHD systems thinking, and the slow unfolding of a grammar for everything. Results first, method when it earns its keep, derivation where it belongs — in the paper.</p>

  <p>What shows up here:</p>

  <ul>
    <li>Technical notes when the idea is ready to be load-bearing</li>
    <li>Founder-voice pieces when the story wants out</li>
    <li>Occasional field reports from the work in progress</li>
  </ul>

  <p>Flip forward to read — each essay is a chapter of the tome.</p>

  <h2 id="building">building</h2>

  <p>The Ur specification grammar is operational. Currently: shipping the first product (Verve MVP) and launching this site. Open to contract and freelance work on the side — see <a href="/resume">résumé</a>.</p>

  <hr />

  <h2 id="thinking-about">thinking about</h2>

  <p>How AI agents coordinate through shared representations instead of alongside each other. What falls out when you derive an ontology instead of designing one. Whether the psychonaut-systems-thinker-who-builds-formal-ontologies niche is a viable personal brand or just a very specific way to be unemployable.</p>

  <hr />

  <h2 id="listening-to">listening to</h2>

  <p>Looping, layering, deconstructing. Always building the next set.</p>

  <hr />

  <h2 id="reading">reading</h2>

  <p>Too many tabs. Not enough books.</p>

# Dyllan.to — Personal Website Holograph
#
# A book-shaped personal website for Dyllan Justice Tô-Yu.
# Solarpunk leather tome aesthetic: warm textures throughout,
# gold and copper accents, circuit-vine SVG decorations.
# Built with Astro + Svelte 5.
#
# Structure:
#   System Holons — tome-engine, tome-aesthetic
#   Page Holons   — 9 content pages rendered as book leaves
#   Single-page island: Astro shell hydrates one Svelte Tome component.


# ============================================================================
# DYLLAN-TO — The Website (Level 3: Holograph)
# ============================================================================

dyllan-to:
  level: 3
  name: Dyllan.to
  description: "Personal website for Dyllan Justice Tô-Yu, shaped like a solarpunk leather tome."

  why:
    identity: >
      A 3D page-flipping personal website rendered as a solarpunk leather tome.
      Part portfolio, part story. Flip through it like a real book.

    motivation: >
      Give Justice a home on the web that embodies his aesthetic and values:
      playful but precise, tactile but digital, inviting but not shallow.

    tenets:
      - "The book metaphor is structural, not decorative. Navigation IS page-flipping."
      - "Each page earns its place. No filler."
      - "Content-first. Book chrome enhances reading, never competes."
      - "Accessible. ARIA roles, live regions, keyboard nav, 44px touch targets."

    tensions:
      - "Delight vs. usability — flip animation shouldn't slow navigation."
      - "Skeuomorphic vs. performant — rich textures vs. fast load."
      - "Single-page vs. deep links — book experience vs. URL shareability."

  what:
    connections:
      memberships:
        - context: Playfaire

      relations:
        - target: website
          type: conforms-to
          description: "Web architecture standards (accessibility, performance, progressive enhancement)."

      facets:
        - name: system
          contains: [tome-engine, tome-aesthetic]
        - name: pages
          contains:
            - page-cover
            - page-epigraph
            - page-philosophy
            - page-architect
            - page-core-projects
            - page-works
            - page-frequencies
            - page-colophon
            - page-back-cover

    schema:
      domain: dyllan.to
      stack: "astro + svelte 5"
      deploy: static
      architecture: "Single-page Astro shell, one Svelte island (client:load)"

    tells:
      - "Looks like a leather-bound book when you land on it."
      - "Pages flip with realistic CSS 3D animation."
      - "Warm throughout — leather covers, parchment interiors, gold accents."
      - "Landscape: two-page spread. Portrait: single-page flipbook."

  how:
    invariants:
      - "Page-flip animation is 750ms cubic-bezier."
      - "First contentful paint under 1.5s on 3G."
      - "Astro SSR renders HTML; Svelte hydrates for interaction."
      - "will-change only on the animating leaf, never globally."

    faults:
      - name: content-trapped
        trigger: "Content only accessible through book UI, not via direct URL."
        consequence: "SEO dies. Sharing breaks."
        status: active  # v1 is single-page, no routing yet

      - name: metaphor-overreach
        trigger: "Book metaphor forces unnatural UX patterns."
        consequence: "Users fight the interface."

      - name: ssr-portrait-flash
        trigger: "SSR renders landscape; portrait device flashes before hydration corrects."
        consequence: "Brief layout shift on mobile."


# ============================================================================
# SYSTEM HOLONS
# ============================================================================

tome-engine:
  level: 2
  name: Tome Engine
  description: "Svelte 5 book component — flip state, 3D transforms, input handling."

  why:
    identity: >
      Page-flip book engine built with Svelte 5. CSS 3D transforms for the flip,
      dual orientation modes (landscape spread / portrait flipbook),
      touch/swipe/keyboard/click input.

    motivation: >
      Make page navigation feel like flipping through a physical book.

    tenets:
      - "CSS-first animation. No canvas, no WebGL. 3D transforms + transitions."
      - "Engine has no content knowledge — reads from leaf/page arrays."
      - "Touch, mouse, keyboard. Swipe, click zones, arrow keys."
      - "Per-leaf transitions. Only the animating leaf gets GPU compositing."

    tensions:
      - "Realism vs. performance — more layers = richer flip = more paint."
      - "Touch gestures vs. scroll — swipe-to-flip can conflict with scroll."

  what:
    connections:
      memberships:
        - context: Dyllan.to
          type: system

      relations:
        - target: tome-aesthetic
          type: styled-by

    schema:
      state:
        isPortrait: "boolean — viewport orientation"
        flipped: "number — how many leaves/pages have been turned"
        animatingLeaf: "number — index of currently animating leaf, -1 if idle"
      derived:
        total: "leaf count (landscape) or page count (portrait)"
        currentPageLabel: "screen reader announcement text"
      orientation-mapping:
        landscape-to-portrait: "[0, 1, 3, 5, 7, 8, 9]"
        portrait-to-landscape: "[0, 1, 2, 2, 3, 3, 4, 4, 5, 6]"

    tells:
      - "3D book in viewport with leather covers and parchment pages."
      - "Pages flip on click/swipe/keyboard with smooth 3D rotation."
      - "Dot indicator showing current position. PREV/NEXT buttons."
      - "Landscape: two-page spread, leaves flip right-to-left (rotateY)."
      - "Portrait: single-page flipbook, pages flip bottom-to-top (rotateX)."
      - "Orientation switch maps reading position deterministically."

  how:
    invariants:
      - "Flip uses CSS transforms only (no JS animation frames)."
      - "Each face: backface-visibility hidden. No overflow:hidden on preserve-3d containers."
      - "will-change applied only to animating leaf, removed after cooldown."
      - "Transitions gated: 'none' unless a flip is in progress."
      - "Z-index: animating leaf at 150, others stacked by position."

    faults:
      - name: z-fighting
        trigger: "Multiple pages at similar z-index during flip."
        consequence: "Pages flicker or show through each other."

      - name: animation-jank
        trigger: "Flip drops below 30fps on mid-range devices."
        consequence: "Core metaphor fails."

      - name: orientation-race
        trigger: "Rapid resize toggles portrait/landscape during animation."
        consequence: "Leaf stuck mid-flip. Mitigated: animatingLeaf forced to -1 on orientation change."


tome-aesthetic:
  level: 2
  name: Tome Aesthetic
  description: "Visual language — solarpunk leather tome that doubles as a terminal. Page flip = rerender."

  why:
    identity: >
      Visual language of Dyllan.to. A solarpunk leather tome that IS a
      terminal. The cover says 'book.' The interiors say 'terminal on
      parchment.' A page flip is a rerender.

    motivation: >
      The contrast between analog exterior and digital interior mirrors
      Justice's work — formal frameworks expressed through tactile interfaces.
      The tome is the device; the pages are the output.

    tenets:
      - "Leather casing, parchment terminal. The book IS the device."
      - "Cover: serif, gold, ornamental. Interior: monospace prompts + serif prose."
      - "Terminal idioms on parchment: > prompts, green/amber accents, mono labels."
      - "SVG decorations bridge both worlds: circuit-trace vines are both organic and digital."

    tensions:
      - "Terminal clarity vs. book warmth — too much mono feels cold, too little loses the concept."
      - "Texture density vs. load time."
      - "Accessibility vs. aesthetic — terminal accents on parchment needs careful contrast."

  what:
    connections:
      memberships:
        - context: Dyllan.to
          type: system

    schema:
      color-tokens:
        # Exterior — leather casing
        leather: "#3a2818"
        leatherMid: "#4a3525"
        spine: "#2a1808"
        gold: "#c9a84c"
        goldBright: "#e8d68c"
        copper: "#b87333"
        # Interior — parchment terminal
        paper: "#f0e4cc"
        paperLight: "#f5ead5"
        paperEdge: "#e0d0b0"
        ink: "#2a1a0a"
        inkLight: "#6a5a4a"
        # Terminal accents
        termGreen: "#2d6b3f"
        termAmber: "#a07828"
        termDim: "#8a7a6a"
        prompt: "#3d7a4f"
      typography:
        display: "Cinzel Decorative (cover, drop-caps)"
        heading: "Cinzel (chapter titles)"
        body: "Cormorant Garamond (prose)"
        mono: "IBM Plex Mono (prompts, labels, metadata)"
      backgrounds:
        leather: "CSS-generated grain (repeating-linear-gradient layers)"
        paper: "CSS-generated parchment (radial-gradient layers)"
        void: "Dark radial gradient (#1a1a2e → #0a0a15)"
      decorations:
        - "CircuitVine.svelte — circuit-trace vine border (left/right)"
        - "CoverSigil.svelte — geometric/organic central emblem (hexagonal + pentagonal)"
        - "CornerOrnament.svelte — corner flourish (4 rotations)"

    tells:
      - "First impression: 'That's a beautiful leather book.'"
      - "Open it and the interior is a parchment terminal — > prompts, monospace labels."
      - "Prose flows in serif; structure renders in mono. Two voices, one page."
      - "Chapter headers feel like terminal section markers."
      - "Project cards render like terminal entries with > prompts."
      - "Gold accents pulse subtly on the cover sigil."

  how:
    invariants:
      - "All textures are CSS-generated or SVG. Zero raster images."
      - "Color tokens defined in tokens.js — single source of truth."
      - "Fonts loaded via <link> in Astro shell with preconnect."
      - "Terminal accents (termGreen, termAmber) used for labels and prompts, never for body text."

    faults:
      - name: contrast-fail
        trigger: "Text falls below WCAG AA ratio."
        consequence: "Content is inaccessible."

      - name: terminal-overreach
        trigger: "Too much monospace makes pages feel cold and breaks the book warmth."
        consequence: "The fusion fails — it's just a terminal skin, not a tome."

      - name: texture-bloat
        trigger: "CSS gradients cause excessive paint time."
        consequence: "Flip animation jitters."


# ============================================================================
# PAGE HOLONS — each is a Svelte component rendered by the Tome engine
# ============================================================================

page-cover:
  level: 2
  name: Cover Page
  description: "Front cover — leather texture, gold title, geometric sigil."

  why:
    identity: "The front cover of the book. First thing visitors see."
    motivation: "Hook the visitor. Set the aesthetic. Invite them to open the book."

    tenets:
      - "Minimal. Name, subtitle, sigil."
      - "The cover IS the landing page."

  what:
    connections:
      memberships:
        - context: Dyllan.to
          type: page
      relations:
        - target: page-epigraph
          type: next-page

    schema:
      position: 0
      content:
        title: "Justice"
        subtitle: "Builder · Musician · Architect"
      layout: cover
      components: [CornerOrnament, CoverSigil]

    tells:
      - "Leather-textured cover with embossed gold lettering."
      - "Geometric sigil pulses with subtle gold glow."
      - "Corner ornaments at all four corners."

  how:
    invariants:
      - "No content below the fold."
      - "Click/tap anywhere flips to next page."

    faults:
      - name: empty-hook
        trigger: "Subtitle fails to intrigue."
        consequence: "No reason to open the book."


page-epigraph:
  level: 2
  name: Epigraph Page
  description: "'Assert nothing. Derive everything.' — the Ur framework motto."

  why:
    identity: "The book's epigraph. Sets the intellectual tone."
    motivation: "Signal that this isn't a standard portfolio. There's a framework underneath."

  what:
    connections:
      memberships:
        - context: Dyllan.to
          type: page
      relations:
        - target: page-cover
          type: prev-page
        - target: page-philosophy
          type: next-page

    schema:
      position: 1
      page-number: "i"
      content:
        quote: "Assert nothing. Derive everything."
        attribution: "The Ur Framework"
      components: [CircuitVine, PageNumber]


page-philosophy:
  level: 2
  name: Philosophy Page
  description: "Philosophy + Practice — two-section page on Justice's approach."

  why:
    identity: "The intellectual foundation. What Justice believes and how he works."
    motivation: "Ground the portfolio in principles before showing projects."

  what:
    connections:
      memberships:
        - context: Dyllan.to
          type: page
      relations:
        - target: page-epigraph
          type: prev-page
        - target: page-architect
          type: next-page

    schema:
      position: 2
      page-number: "ii"
      content:
        sections:
          - label: Philosophy
            text: "Local-first. Data-sovereign. Community-owned."
          - label: Practice
            text: "Recursive specification as design method."
      components: [CircuitVine, PageNumber]


page-architect:
  level: 2
  name: Architect Page
  description: "Chapter I — The Architect. Who Justice is."

  why:
    identity: "Who Justice is. Not a CV — a person."
    motivation: "The Feynman-at-a-barbecue version. Brief, real, human."

    tenets:
      - "First person. Conversational. Not corporate."
      - "Show, don't list. A narrative, not bullet points."

  what:
    connections:
      memberships:
        - context: Dyllan.to
          type: page
      relations:
        - target: page-philosophy
          type: prev-page
        - target: page-core-projects
          type: next-page

    schema:
      position: 3
      page-number: "iii"
      chapter: "I"
      title: "The Architect"
      subtitle: "On building and becoming"
      content:
        drop-cap: "S"
        text: "Systems thinker. Software engineer. Solo founder of Playfaire PBC..."
      components: [CircuitVine, ChapterHeader, PageNumber]

    tells:
      - "Chapter header with ornamental divider."
      - "Drop-cap first letter in display font."
      - "Reads like a story, not a resume."

  how:
    faults:
      - name: resume-mode
        trigger: "Content reads like a LinkedIn profile."
        consequence: "The personal voice is lost."


page-core-projects:

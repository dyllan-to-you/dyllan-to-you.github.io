# Dyllan.to Glamour — Projection Registry
#
# Maps source Holons from dyllan-to.holograph.yaml to their
# projection artifacts (Svelte components, Astro shell, config).

glamour:
  name: Dyllan.to Glamour

  why:
    identity: >
      Projection registry for the Dyllan.to website. Lists every
      artifact with its source Holon and lens pipeline.

    purpose: >
      An agent reading this file can enumerate all website artifacts
      and trace each back to its source Holon.

  what:
    connections:
      relations:
        - target: dyllan-to/dyllan-to.holograph.yaml
          type: source

    schema:
      projections:
        # ── Astro shell ──
        - artifact: src/pages/index.astro
          source: dyllan-to
          lens: [astro-page]
          description: "Astro shell. Font loading, meta tags, hydrates Tome island."

        - artifact: astro.config.mjs
          source: dyllan-to
          lens: [astro-config]
          description: "Astro configuration. Svelte integration, site URL."

        # ── Engine ──
        - artifact: src/components/tome/Tome.svelte
          source: tome-engine
          lens: [svelte-component]
          description: "Book engine. Flip state, 3D transforms, orientation, input, a11y."

        - artifact: src/components/tome/tokens.js
          source: tome-aesthetic
          lens: [js-module]
          description: "Design tokens. Colors, fonts, timing, layout, z-index, orientation maps."

        # ── Decorations (source: tome-aesthetic) ──
        - artifact: src/components/tome/CircuitVine.svelte
          source: tome-aesthetic
          lens: [svelte-component, svg]
          description: "Circuit-trace vine border decoration."

        - artifact: src/components/tome/CoverSigil.svelte
          source: tome-aesthetic
          lens: [svelte-component, svg]
          description: "Geometric/organic central emblem. Hexagonal + pentagonal geometry."

        - artifact: src/components/tome/CornerOrnament.svelte
          source: tome-aesthetic
          lens: [svelte-component, svg]
          description: "Corner flourish. 4 rotations via position prop."

        # ── Atoms (source: tome-aesthetic + tome-engine) ──
        - artifact: src/components/tome/PageNumber.svelte
          source: tome-aesthetic
          lens: [svelte-component]
          description: "Centered page number at bottom of page."

        - artifact: src/components/tome/ProjectCard.svelte
          source: tome-aesthetic
          lens: [svelte-component]
          description: "Project name + description card."

        - artifact: src/components/tome/ChapterHeader.svelte
          source: tome-aesthetic
          lens: [svelte-component]
          description: "Chapter opener: number, title, subtitle, divider."

        - artifact: src/components/tome/PaperBlank.svelte
          source: tome-aesthetic
          lens: [svelte-component]
          description: "Blank paper page (endpapers, fillers)."

        # ── Page components (source: page-* holons) ──
        - artifact: src/components/tome/CoverPage.svelte
          source: page-cover
          lens: [svelte-component, cover-layout]
          description: "Front cover. Leather texture, gold title, sigil, corner ornaments."

        - artifact: src/components/tome/EpigraphPage.svelte
          source: page-epigraph
          lens: [svelte-component, paper-layout]
          description: "Epigraph. 'Assert nothing. Derive everything.'"

        - artifact: src/components/tome/PhilosophyPage.svelte
          source: page-philosophy
          lens: [svelte-component, paper-layout]
          description: "Philosophy + Practice. Two-section page."

        - artifact: src/components/tome/ArchitectPage.svelte
          source: page-architect
          lens: [svelte-component, paper-layout]
          description: "Chapter I — The Architect. Drop-cap narrative."

        - artifact: src/components/tome/CoreProjectsPage.svelte
          source: page-core-projects
          lens: [svelte-component, paper-layout]
          description: "Ur, Faewyld, Ludex project cards."

        - artifact: src/components/tome/WorksPage.svelte
          source: page-works
          lens: [svelte-component, paper-layout]
          description: "Chapter II — Locus, Verve, Toast project cards."

        - artifact: src/components/tome/FrequenciesPage.svelte
          source: page-frequencies
          lens: [svelte-component, paper-layout]
          description: "Chapter III — Music and performance."

        - artifact: src/components/tome/ColophonPage.svelte
          source: page-colophon
          lens: [svelte-component, paper-layout]
          description: "Closing inscription. Playfaire PBC · MMXXVI."

        - artifact: src/components/tome/BackCover.svelte
          source: page-back-cover
          lens: [svelte-component, cover-layout]
          description: "Back cover. Leather texture, muted sigil."

  how:
    invariants:
      - "Every artifact traces to a source Holon in dyllan-to.holograph.yaml."
      - "Every Svelte component in src/components/tome/ has an entry."
      - "Lens pipelines point toward sources, never away."
